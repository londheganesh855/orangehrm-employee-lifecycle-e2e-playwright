name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      LoginUsername: ${{ secrets.LOGIN_USERNAME }}
      LoginPassword: ${{ secrets.LOGIN_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 🔥 RUN TESTS WITH TRACE + DEBUG
      - name: Run Playwright tests (DEBUG MODE)
        run: npx playwright test --trace on --reporter=list

      # 🔥 SAVE TRACE FILES (VERY IMPORTANT FOR 0.0s FAILURES)
      - name: Upload Playwright trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: test-results/
          retention-days: 7

      # 🔥 HTML REPORT
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30
